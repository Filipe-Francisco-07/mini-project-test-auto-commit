name: DocGen Pipeline

  on:
    push:
      branches:
        - master
        - main

  jobs:

    docgen:

      runs-on: ubuntu-latest

      steps:

        - uses: actions/checkout@v4

        - uses: shivammathur/setup-php@v2
          with:
            php-version: 8.2

        - name: Run DocGen
          run: php bin/run.php
          env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  